# Base configuration — shared across all environments.
# Set database.url via the DATABASE_URL env var or APP__DATABASE__URL.

[database]
url = ""
max_connections = 10
acquire_timeout_secs = 10

[dispatch]
poll_interval_secs = 5
batch_size = 50
# Maximum concurrent in-flight HTTP calls per dispatch cycle.
# Must be <= database.max_connections to avoid pool starvation under slow callbacks.
dispatch_concurrency = 16
schedule_batch_size = 500
max_attempts = 6
backoff_secs = [30, 120, 600, 3600, 21600, 86400]
handler_timeout_secs = 30
lock_buffer_secs = 10
external_timeout_sweep_interval_secs = 60
max_completion_cycles = 20
payload_size_limit_bytes = 1048576
notify_channel = "outbox_events_new"
allow_insecure_urls = false
allow_unsigned_callbacks = false
allow_private_ip_targets = false
max_callbacks_per_event = 32

[log]
format = "json"
filter = "info"

[admin]
bind = "0.0.0.0:9090"
# auth_token is required for admin endpoints; set via ADMIN_TOKEN env var or .env.toml

[http_client]
connect_timeout_secs = 5
user_agent = "outbox-dispatcher/1.0"
allow_insecure_tls = false

[retention]
enabled = false
processed_retention_days = 7
dead_letter_retention_days = 30
cleanup_interval_secs = 3600
batch_limit = 1000

# Signing keys: maps key id -> env var name holding the base64-encoded HMAC secret.
# Example:
# [signing_keys]
# "welcome-v1" = { secret_env = "WELCOME_HMAC_SECRET" }
[signing_keys]
