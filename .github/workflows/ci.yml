name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use the checked-in .sqlx cache so all steps work without a live database.
  SQLX_OFFLINE: true

jobs:
  # ── Fast checks (no DB needed) ─────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Unit tests (no DB needed) ──────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test (lib + unit)
        run: cargo test --workspace --lib

  # ── Integration tests (real Postgres via testcontainers) ──────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # testcontainers pulls the postgres image at runtime — Docker is
      # pre-installed on ubuntu-latest runners.
      - name: cargo test (integration)
        run: cargo test --workspace --test '*'

  # ── Release build ──────────────────────────────────────────────────────────
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --bin outbox-dispatcher

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: outbox-dispatcher-linux-x86_64
          path: target/release/outbox-dispatcher
          retention-days: 7
