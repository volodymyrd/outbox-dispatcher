services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: outbox
      POSTGRES_PASSWORD: outbox
      POSTGRES_DB: outbox_dispatcher
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbox -d outbox_dispatcher"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
